{% if audio_url %}
<div style="margin:20px 0;padding:16px;background:var(--card-bg, #f9fafb);border:1px solid var(--border, #e5e7eb);border-radius:8px;">
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim, #9ca3af);margin-bottom:8px;">Listen to this issue</div>
    <audio controls preload="none" style="width:100%;">
        <source src="{{ audio_url }}" type="audio/mpeg">
        Your browser does not support audio playback.
    </audio>
</div>
{% endif %}
