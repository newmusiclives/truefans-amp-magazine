<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ newsletter.artist_name }} Newsletter</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            max-width: 480px;
            width: 100%;
            padding: 48px 32px;
            text-align: center;
        }
        .brand-accent {
            width: 64px;
            height: 4px;
            background: {{ newsletter.brand_color or '#e8645a' }};
            border-radius: 2px;
            margin: 0 auto 32px;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        h1 span {
            color: {{ newsletter.brand_color or '#e8645a' }};
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .fan-count {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 24px;
        }
        .fan-count strong {
            color: {{ newsletter.brand_color or '#e8645a' }};
        }
        .subscribe-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .subscribe-form input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            background: #12121f;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .subscribe-form input:focus {
            border-color: {{ newsletter.brand_color or '#e8645a' }};
        }
        .subscribe-form input::placeholder {
            color: #555;
        }
        .subscribe-form button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: {{ newsletter.brand_color or '#e8645a' }};
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .subscribe-form button:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 48px;
            font-size: 0.75rem;
            color: #444;
        }
        .footer a {
            color: #555;
            text-decoration: none;
        }
        .footer a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-accent"></div>
        <h1><span>{{ newsletter.artist_name }}</span></h1>
        {% if newsletter.tagline %}
        <p class="tagline">{{ newsletter.tagline }}</p>
        {% endif %}
        {% if sub_count > 0 %}
        <p class="fan-count">Join <strong>{{ sub_count }}</strong> fan{{ 's' if sub_count != 1 else '' }} already subscribed</p>
        {% endif %}
        <div id="subscribe-area">
            <form class="subscribe-form" hx-post="/n/{{ newsletter.slug }}/subscribe" hx-target="#subscribe-area" hx-swap="innerHTML">
                <input type="email" name="email" placeholder="Your email address" required>
                <input type="text" name="first_name" placeholder="First name (optional)">
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <div class="footer">
            Powered by <a href="/">TrueFans NEWSLETTERS</a>
        </div>
    </div>
</body>
</html>
