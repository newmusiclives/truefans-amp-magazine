<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password — TrueFans SIGNAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>TrueFans SIGNAL</h1>
            <div class="tagline">Reset your password</div>
        </div>
        {% if message %}
        <div style="background:#e8f4e8;color:#1e5a1e;padding:12px;border-radius:6px;margin-bottom:16px;font-size:14px;">{{ message }}</div>
        {% endif %}
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login/forgot">
            <div class="login-field">
                <label for="email">Admin email</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            <button type="submit" class="login-btn">Send reset link</button>
        </form>
        <p style="margin-top:16px;text-align:center;font-size:13px;color:#888;">
            <a href="/login" style="color:#888;">Back to sign in</a>
        </p>
    </div>
</body>
</html>
