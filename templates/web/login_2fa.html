<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-factor verification — TrueFans SIGNAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>TrueFans SIGNAL</h1>
            <div class="tagline">Two-factor verification</div>
        </div>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login/2fa">
            <div class="login-field">
                <label for="code">6-digit code from your authenticator app</label>
                <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required autofocus>
            </div>
            <button type="submit" class="login-btn">Verify</button>
        </form>
        <p style="margin-top:16px;text-align:center;font-size:13px;color:#888;">
            <a href="/login" style="color:#888;">Start over</a>
        </p>
    </div>
</body>
</html>
