<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password — TrueFans SIGNAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>TrueFans SIGNAL</h1>
            <div class="tagline">Set a new password</div>
        </div>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        {% if token %}
        <form method="post" action="/login/reset">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="login-field">
                <label for="new_password">New password</label>
                <input type="password" id="new_password" name="new_password" minlength="12" required autofocus>
            </div>
            <div class="login-field">
                <label for="confirm_password">Confirm new password</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="12" required>
            </div>
            <button type="submit" class="login-btn">Set password</button>
        </form>
        {% else %}
        <p style="text-align:center;"><a href="/login/forgot">Request a new reset link</a></p>
        {% endif %}
    </div>
</body>
</html>
