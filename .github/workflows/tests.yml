name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---- Default suite: SQLite (fast, hermetic, gates every PR) ----
  sqlite:
    name: pytest (sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: pytest -q --cov=weeklyamp --cov-report=term

  # ---- Postgres suite: catches schema/SQL drift between schema.sql and schema_pg.sql ----
  postgres:
    name: pytest (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weeklyamp
          POSTGRES_PASSWORD: weeklyamp
          POSTGRES_DB: weeklyamp_test
        ports:
          - 5432:5432
        # Wait until Postgres is healthy before steps run
        options: >-
          --health-cmd "pg_isready -U weeklyamp -d weeklyamp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      WEEKLYAMP_DB_BACKEND: postgres
      WEEKLYAMP_DATABASE_URL: postgresql://weeklyamp:weeklyamp@localhost:5432/weeklyamp_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest psycopg2-binary
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U weeklyamp; then
              echo "postgres is ready"
              exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready" >&2
          exit 1
      - name: Run tests
        # Postgres-backend tests are not yet wired through the existing
        # `tmp_db` fixture (which always creates SQLite). Until that
        # fixture grows a Postgres branch, this job's primary value is
        # importing the package against psycopg2 and applying
        # schema_pg.sql via init_database, which catches the most
        # common drift (missing column, syntax mismatch).
        run: |
          python -c "from weeklyamp.core.database import init_database; init_database('weeklyamp_test')"
          pytest -q
