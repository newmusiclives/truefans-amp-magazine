newsletter:
  name: "TrueFans NEWSLETTERS"
  tagline: "The music newsletters for industry professionals, music artists and their fans."
  from_name: "PS"
  reply_to: ""
  header_image_url: "https://web-production-88ebc.up.railway.app/static/header-logo.png"
  intro_copy: "<p style='font-size:18px;font-weight:600;color:#000000;margin:0'>The independent artist's edge — music industry intelligence, creative strategy, and the tools to build your career on your own terms.</p>"
  footer_html: "<p><strong>TrueFans NEWSLETTERS</strong> — for Industry Professionals, Music Artists and Fans</p><p style='margin:8px 0'>&copy; 2026 TrueFans NEWSLETTERS. All rights reserved.</p><p style='margin:8px 0'><a href='#'>Twitter</a> &nbsp;|&nbsp; <a href='#'>Instagram</a> &nbsp;|&nbsp; <a href='#'>LinkedIn</a></p>"

ai:
  provider: "anthropic"
  model: "claude-sonnet-4-5-20250929"
  max_tokens: 2000
  temperature: 0.7

beehiiv:
  api_key: ""
  publication_id: ""

schedule:
  frequency: 3
  send_days:
    - "monday"
    - "wednesday"
    - "saturday"

sponsor_slots:
  max_per_issue: 2
  available_positions:
    - "top"
    - "mid"
    - "bottom"

agents:
  default_autonomy: "supervised"
  review_required: true
  max_concurrent_tasks: 3

submissions:
  api_key: ""
  auto_acknowledge: true
  require_email: true

email:
  enabled: false
  smtp_host: "smtp.mailgun.org"  # GoHighLevel uses Mailgun under the hood
  smtp_port: 587                  # STARTTLS
  smtp_user: ""                   # your-user@yourdomain.com (from GHL SMTP settings)
  smtp_password: ""               # from GHL SMTP settings
  from_address: ""                # your sending email address
  from_name: "TrueFans NEWSLETTERS"

analytics:
  plausible_domain: ""  # e.g. "truefansnewsletters.com" — leave empty to disable

rate_limits:
  login_max: 5
  login_window: 900
  subscribe_max: 5
  subscribe_window: 900
  submit_max: 10
  submit_window: 900

db_path: "data/weeklyamp.db"
db_backend: "sqlite"  # "sqlite" or "postgres"

site_domain: "https://truefansnewsletters.com"
session_max_age: 43200  # 12 hours
pagination_default: 50
max_request_body: 1048576  # 1 MB
