newsletter:
  name: "TrueFans NEWSLETTERS"
  tagline: "The music newsletters for industry professionals, music artists and their fans."
  from_name: "PS"
  reply_to: ""
  header_image_url: "https://web-production-88ebc.up.railway.app/static/header-logo.png"
  intro_copy: "<p style='font-size:18px;font-weight:600;color:#000000;margin:0'>The independent artist's edge — music industry intelligence, creative strategy, and the tools to build your career on your own terms.</p>"
  footer_html: "<p><strong>TrueFans NEWSLETTERS</strong> — for Industry Professionals, Music Artists and Fans</p><p style='margin:8px 0'>&copy; 2026 TrueFans NEWSLETTERS. All rights reserved.</p><p style='margin:8px 0'><a href='#'>Twitter</a> &nbsp;|&nbsp; <a href='#'>Instagram</a> &nbsp;|&nbsp; <a href='#'>LinkedIn</a></p>"

ai:
  provider: "anthropic"
  model: "claude-sonnet-4-5-20250929"
  max_tokens: 2000
  temperature: 0.7

ghl:
  api_key: ""            # GoHighLevel API key (Bearer token)
  location_id: ""        # GHL sub-account / location ID
  edition_tags:
    fan: "newsletter-fan"
    artist: "newsletter-artist"
    industry: "newsletter-industry"

schedule:
  frequency: 3
  send_days:
    - "monday"
    - "wednesday"
    - "saturday"

sponsor_slots:
  max_per_issue: 2
  available_positions:
    - "top"
    - "mid"
    - "bottom"

agents:
  default_autonomy: "supervised"
  review_required: true
  max_concurrent_tasks: 3

submissions:
  api_key: ""
  auto_acknowledge: true
  require_email: true

email:
  enabled: false
  smtp_host: "smtp.mailgun.org"  # GoHighLevel uses Mailgun under the hood
  smtp_port: 587                  # STARTTLS
  smtp_user: ""                   # your-user@yourdomain.com (from GHL SMTP settings)
  smtp_password: ""               # from GHL SMTP settings
  from_address: ""                # your sending email address
  from_name: "TrueFans NEWSLETTERS"

analytics:
  plausible_domain: ""  # e.g. "truefansnewsletters.com" — leave empty to disable
  tracking_enabled: false
  utm_auto_tag: false
  utm_source: "truefans_newsletter"
  utm_medium: "email"

# --- Email open/click tracking (INACTIVE — set to true to activate) ---
tracking:
  open_tracking: true
  click_tracking: true
  tracking_domain: ""  # e.g. "trk.truefansnewsletters.com"

# --- A/B testing for subject lines (INACTIVE) ---
ab_testing:
  enabled: true
  default_sample_percent: 20
  default_measurement_hours: 4
  auto_send_winner: false

# --- Deliverability: bounce handling + warm-up (INACTIVE) ---
deliverability:
  bounce_handling: true
  hard_bounce_threshold: 1     # suppress after N hard bounces
  soft_bounce_threshold: 3     # suppress after N soft bounces
  auto_suppress: false
  warmup_enabled: false
  warmup_daily_start: 50       # emails per day on day 1
  warmup_ramp_increment: 50   # increase per day

# --- Scheduled publishing (INACTIVE) ---
scheduler:
  enabled: true
  check_interval_seconds: 60
  default_send_hour: 9
  default_timezone: "America/New_York"

# --- Webhooks inbound/outbound (INACTIVE) ---
webhooks:
  enabled: true
  inbound_secret: ""
  max_retries: 3
  timeout_seconds: 10

# --- Referral system (INACTIVE) ---
referrals:
  enabled: true
  reward_threshold: 3
  code_prefix: "TF"

# --- Welcome drip sequence for new subscribers (INACTIVE) ---
welcome_sequence:
  enabled: true
  default_steps: 3

# --- Re-engagement automation (INACTIVE) ---
reengagement:
  enabled: true
  inactive_days: 30
  suppress_after_days: 60

# --- Team roles & access control (INACTIVE) ---
roles:
  enabled: false
  require_login: true

# ===================================================================
# MUSIC-SPECIFIC FEATURES (all INACTIVE — enable to activate)
# ===================================================================

# --- Spotify API integration for artist data & streaming stats ---
spotify:
  enabled: false
  client_id: ""       # Spotify Developer App client ID
  client_secret: ""   # Spotify Developer App client secret
  cache_ttl_hours: 24
  auto_lookup_submissions: false  # auto-search Spotify when artist submits

# --- Public artist profile pages at /artists/{slug} ---
artist_profiles:
  enabled: true
  allow_self_service: false  # let artists edit their own profiles
  require_approval: true

# --- Genre preference system for subscriber personalization ---
genre_preferences:
  enabled: false
  available_genres:
    - Alternative
    - Americana
    - Blues
    - Classical
    - Country
    - Electronic
    - Folk
    - Funk
    - Gospel
    - Hip-Hop
    - Indie
    - Jazz
    - Latin
    - Metal
    - Pop
    - Punk
    - R&B
    - Reggae
    - Rock
    - Singer-Songwriter
    - Soul
    - Tribute/Cover Band
    - World
    - Other
  weight_sections_by_genre: false
  max_genres_per_subscriber: 5

# --- Section-level engagement scoring ---
section_engagement:
  enabled: true
  score_decay_days: 90
  min_events_for_profile: 5
  reorder_by_engagement: false

# --- Music trivia & polls embedded in newsletters ---
trivia_polls:
  enabled: true
  max_options: 6
  show_results_in_next_issue: true
  leaderboard_size: 25

# ===================================================================
# GROWTH & MONETIZATION (all INACTIVE — enable to activate)
# ===================================================================

# --- Lead magnets: gated downloads to drive signups ---
lead_magnets:
  enabled: true

# --- Sponsor self-service portal + public advertise page ---
sponsor_portal:
  enabled: true
  public_rates_visible: false
  base_cpm: 30.0
  premium_position_multiplier: 1.5
  weekly_discount: 0.9
  monthly_discount: 0.8

# --- Contests & giveaways ---
contests:
  enabled: true
  max_active: 3

# --- Reader-submitted content (hot takes, reviews) ---
reader_content:
  enabled: true
  auto_approve: false
  max_per_issue: 2

# --- Paid subscriber tiers (INACTIVE — requires Manifest Financial API keys) ---
paid_tiers:
  enabled: false
  payment_provider: "manifest"
  manifest_api_key: ""          # Manifest Financial API key (or MANIFEST_API_KEY env var)
  manifest_webhook_secret: ""   # Manifest webhook HMAC secret (or MANIFEST_WEBHOOK_SECRET env var)
  dunning_enabled: false
  dunning_grace_days: 3

# --- Audio newsletter via TTS (INACTIVE) ---
audio:
  enabled: false
  tts_provider: "openai"
  voice_id: ""
  output_format: "mp3"

# --- Community forum (INACTIVE) ---
community:
  enabled: false
  require_verified_email: true
  moderation_enabled: true

# --- Market-specific sub-editions ---
edition_markets:
  enabled: true

# --- Artist newsletters (coming soon) ---
artist_newsletters:
  enabled: false
  waitlist_enabled: true

# --- City edition licensing ---
licensing:
  enabled: true
  default_monthly_fee_cents: 15000
  default_annual_fee_cents: 99900
  default_revenue_share_pct: 20.0
  trial_days: 30

# --- White-label SaaS (INACTIVE) ---
white_label:
  enabled: false
  custom_domain_support: false

# --- Internationalization / multi-language (INACTIVE) ---
i18n:
  enabled: false
  target_languages:
    - es
    - pt
    - fr
  auto_translate: false

# --- Podcast generation from newsletter content (INACTIVE) ---
podcast:
  enabled: false
  intro_text: "Welcome to TrueFans Newsletters, the podcast."
  outro_text: "Thanks for listening to TrueFans Newsletters."
  rss_enabled: false

# --- Franchise / territory model (INACTIVE) ---
franchise:
  enabled: false
  territory_exclusive: true
  market_tiers:
    - small
    - medium
    - large
    - major

# --- Data / analytics product (INACTIVE) ---
data_product:
  enabled: false
  api_metered_billing: false

rate_limits:
  login_max: 5
  login_window: 900
  subscribe_max: 5
  subscribe_window: 900
  submit_max: 10
  submit_window: 900

db_path: "data/weeklyamp.db"
db_backend: "sqlite"  # "sqlite" or "postgres"

site_domain: "https://truefansnewsletters.com"
session_max_age: 43200  # 12 hours
pagination_default: 50
max_request_body: 1048576  # 1 MB
